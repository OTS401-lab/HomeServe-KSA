<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeServe KSA | Premium Food Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #006C35; --gold: #C5A059; --dark: #0f172a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f8fafc; color: var(--dark); overflow-x: hidden; }

        /* Multi-Language Bar - Arabic First */
        .lang-bar { background: var(--dark); padding: 15px; display: flex; justify-content: center; gap: 10px; position: sticky; top: 0; z-index: 1000; }
        .lang-bar button { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 6px 15px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; font-weight: 600; }

        /* Header with Pic */
        header { 
            background: linear-gradient(135deg, var(--dark), var(--primary)); 
            color: white; padding: 70px 20px 50px; text-align: center; border-bottom: 5px solid var(--gold); 
            display: flex; flex-direction: column; align-items: center; position: relative;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 0 100%);
        }
        .header-pic-container { position: absolute; top: 15px; left: 15px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .header-pic { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid var(--gold); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .maintenance-text { color: white; font-size: 0.55rem; font-weight: 700; background: var(--primary); padding: 2px 6px; border-radius: 5px; font-family: 'Orbitron', sans-serif; }

        header h1 { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; color: var(--gold); margin-top: 10px; }

        /* Marquee */
        .future-foods { background: white; padding: 10px 0; border-bottom: 2px solid var(--gold); overflow: hidden; }
        .future-foods p { display: inline-block; white-space: nowrap; font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--primary); animation: scrollText 20s linear infinite; }
        @keyframes scrollText { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* Tracker */
        .tracker { background: var(--dark); color: white; margin: 20px auto; padding: 20px; border-radius: 20px; max-width: 550px; width: 92%; }
        .progress-line { height: 8px; background: #334155; border-radius: 5px; margin: 12px 0; overflow: hidden; }
        .progress-fill { width: 60%; height: 100%; background: var(--gold); }

        /* Grid */
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .grid { display: grid; gap: 15px; }
        .food-card { background: white; border-radius: 20px; padding: 12px; display: flex; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
        .food-img { font-size: 2.2rem; background: #f0fdf4; width: 65px; height: 65px; display: flex; align-items: center; justify-content: center; border-radius: 15px; }
        .food-info { flex: 1; padding: 0 15px; }
        .food-info h3 { font-size: 0.95rem; }
        .price { font-weight: 700; color: var(--primary); }
        .order-btn { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 10px; font-weight: 600; cursor: pointer; }

        /* Modal */
        #checkoutModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; backdrop-filter: blur(8px); }
        .modal-content { background: white; width: 90%; max-width: 400px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 25px; border-radius: 25px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 0.95rem; outline: none; }
        .confirm-btn { background: #22c55e; color: white; width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="lang-bar">
        <button onclick="setLang('ar')">العربية</button>
        <button onclick="setLang('en')">English</button>
        <button onclick="setLang('bn')">বাংলা</button>
        <button onclick="setLang('hi')">हिन्दी</button>
    </div>

    <header>
        <div class="header-pic-container">
            <span class="maintenance-text">Maintenance The Class</span>
            <img src="https://i.ibb.co/vz6G3S0/your-pic.png" alt="Owner" class="header-pic">
        </div>
        <h1 id="h-title">HOMESERVE KSA</h1>
        <p id="h-sub">Premium Homemade Taste & Smart Delivery</p>
    </header>

    <div class="future-foods">
        <p>★ MORE PREMIUM FOODS ARE COMING SOON - STAY TUNED! ★ قريباً المزيد من الأطعمة الشهية ★ আরও সুস্বাদু খাবার শীঘ্রই আসছে ★</p>
    </div>

    <div class="tracker">
        <h4 id="track-h"><i class="fas fa-motorcycle"></i> Rider is 10 mins away</h4>
        <div class="progress-line"><div class="progress-fill"></div></div>
        <div style="display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 600; color: var(--gold);">
            <span id="s-rec">Order Received</span>
            <span id="s-time">Rider: Active</span>
        </div>
    </div>

    <div class="container">
        <h2 id="m-title" style="margin-bottom: 20px; border-left: 5px solid var(--gold); padding-left: 10px;">Our Menu</h2>
        <div class="grid" id="menuGrid"></div>
    </div>

    <div id="checkoutModal">
        <div class="modal-content">
            <h2 id="modal-title" style="color: var(--primary);">Confirm Order</h2>
            <p id="sel-food" style="margin: 10px 0; font-weight: 700; border-bottom: 1px solid #eee; padding-bottom: 5px;"></p>
            <input type="text" id="c-name" placeholder="Full Name">
            <input type="tel" id="c-phone" placeholder="WhatsApp Number">
            <input type="text" id="c-loc" placeholder="Delivery Address">
            <select id="c-pay">
                <option value="STC Pay">STC Pay</option>
                <option value="Al Rajhi Bank">Al Rajhi Bank</option>
            </select>
            <button class="confirm-btn" onclick="submitOrder()">Confirm Order</button>
            <p onclick="closeModal()" style="margin-top: 15px; color: #94a3b8; cursor: pointer; font-size: 0.85rem;">Cancel</p>
        </div>
    </div>

    <script>
        const foodList = [
            { icon: "🍗", p: "45 SR", en: "Broasted Chicken (4pc)", ar: "دجاج بروستد", bn: "ব্রোস্টেড চিকেন", hi: "ब्रोस्टेड चिकन" },
            { icon: "🍛", p: "65 SR", en: "Mutton Kabsa", ar: "كبسة لحم غنم", bn: "খাসির কাবসা", hi: "मटन कब्सा" },
            { icon: "🍔", p: "38 SR", en: "Double Beef Burger", ar: "برجر لحم دبل", bn: "ডাবল বিফ বার্গার", hi: "डबल बीफ बर्गर" },
            { icon: "🥪", p: "30 SR", en: "Club Sandwich", ar: "كلوب ساندوتش", bn: "ক্লাব স্যান্ডউইচ", hi: "क्लब सैंडविच" },
            { icon: "🔥", p: "42 SR", en: "Al Faham Chicken", ar: "دجاج الفحم", bn: "আল ফাহাম চিকেন", hi: "अल فहम चिकन" },
            { icon: "🌯", p: "35 SR", en: "Shawarma Jumbo", ar: "شاورما جامبو", bn: "শাওয়ারমা জ্যাম্বো", hi: "शवरमा जंबो" },
            { icon: "🍱", p: "50 SR", en: "Chicken Mandi", ar: "مندي دجاج", bn: "চিকেন মান্দি", hi: "चिकन मंडी" },
            { icon: "🍢", p: "75 SR", en: "Mixed Grill", ar: "مشويات مشكلة", bn: "মিক্সড গ্রিল", hi: "मिक্স ग्रिल" },
            { icon: "🍝", p: "40 SR", en: "White Sauce Pasta", ar: "باستا صوص أبيض", bn: "পাস্তা হোয়াইট সস", hi: "व्हाइट सॉस पास्ता" },
            { icon: "🍕", p: "55 SR", en: "Premium Pizza", ar: "بيتزا فاخرة", bn: "প্রিমিয়াম পিজ্জা", hi: "प्रीमियम पिज्जा" },
            { icon: "🍤", p: "80 SR", en: "Grilled Prawns", ar: "روبيان مشوي", bn: "গ্রিলড প্রন", hi: "ग्रिल्ड प्रॉन" },
            { icon: "🥗", p: "20 SR", en: "Arabic Salad", ar: "سلطة عربية", bn: "আরবি সালাদ", hi: "अरबी सलाद" },
            { icon: "🍰", p: "30 SR", en: "Kunafa Cheese", ar: "كنافة بالجبن", bn: "কুনাফা চিজ", hi: "कुनाफा पनीर" },
            { icon: "🥞", p: "28 SR", en: "Honey Pancake", ar: "بان كيك بالعسل", bn: "প্যানকেক মধু দিয়ে", hi: "पैनकेक शहद" },
            { icon: "🍦", p: "18 SR", en: "Turkish Ice Cream", ar: "آيس كريم تركي", bn: "তুর্কি আইসক্রিম", hi: "तुर्की आइसक्रीम" },
            { icon: "🍟", p: "15 SR", en: "French Fries", ar: "بطاطس مقلية", bn: "ফ্রেঞ্চ ফ্রাই", hi: "फ्रेंच फ्राइज़" },
            { icon: "☕", p: "12 SR", en: "Saudi Coffee", ar: "قهوة سعودية", bn: "সৌদি কফি", hi: "सऊदी कॉफी" },
            { icon: "🍹", p: "25 SR", en: "Fruit Cocktail", ar: "كوكتيل فواكه", bn: "ফ্রেশ ককটেল", hi: "फ्रेश कॉকটেল" },
            { icon: "🍩", p: "10 SR", en: "Fresh Donuts", ar: "دونات طازجة", bn: "তাজা ডোনাটস", hi: "डोनটস" },
            { icon: "🥘", p: "48 SR", en: "Mutton Madhu", ar: "مضغوط لحم", bn: "খাসির মাজগুত", hi: "मटन मधू" }
        ];

        let curL = 'en';
        let selF = ""; let selP = "";

        const ui = {
            en: { title: "HOMESERVE KSA", m: "Our Menu", b: "Order", tr: "Rider is 10 mins away", r: "Received", t: "Rider: Active" },
            ar: { title: "هوم سيرف السعودية", m: "قائمة الطعام", b: "طلب", tr: "السائق على بعد ١٠ دقائق", r: "تم الاستلام", t: "السائق: متاح" },
            bn: { title: "হোম-সার্ভ কেএসএ", m: "খাবার তালিকা", b: "অর্ডার", tr: "রাইডার ১০ মিনিটের দূরত্বে আছে", r: "গৃহীত হয়েছে", t: "রাইডার: সক্রিয়" }
        };

        function setLang(l) {
            curL = l;
            document.getElementById('h-title').innerText = ui[l].title;
            document.getElementById('m-title').innerText = ui[l].m;
            document.getElementById('track-h').innerText = ui[l].tr;
            document.getElementById('s-rec').innerText = ui[l].r;
            document.getElementById('s-time').innerText = ui[l].t;
            renderMenu();
        }

        function renderMenu() {
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = "";
            foodList.forEach(f => {
                grid.innerHTML += `
                    <div class="food-card">
                        <div class="food-img">${f.icon}</div>
                        <div class="food-info">
                            <h3>${f[curL] || f.en}</h3>
                            <div class="price">${f.p}</div>
                        </div>
                        <button class="order-btn" onclick="openCheckout('${f[curL] || f.en}', '${f.p}')">${ui[curL].b}</button>
                    </div>`;
            });
        }

        function openCheckout(n, p) {
            selF = n; selP = p;
            document.getElementById('sel-food').innerText = n + " - " + p;
            document.getElementById('checkoutModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('checkoutModal').style.display = 'none'; }

        function submitOrder() {
            const n = document.getElementById('c-name').value;
            const ph = document.getElementById('c-phone').value;
            const l = document.getElementById('c-loc').value;
            const pay = document.getElementById('c-pay').value;

            if(!n || !ph || !l) { alert("Please complete all details!"); return; }

            // NEW: Confirmation Message
            alert("Order Confirm, Shukriyan Habibi.");

            const text = `*🚨 NEW FOOD ORDER 🚨*%0A%0A*Item:* ${selF}%0A*Price:* ${selP}%0A%0A*Customer:* ${n}%0A*Phone:* ${ph}%0A*Location:* ${l}%0A*Payment:* ${pay}`;
            window.open(`https://wa.me/966560976031?text=${text}`, '_blank');
            closeModal();
        }

        setLang('en');
    </script>
</body>
</html>
